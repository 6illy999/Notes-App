{% extends 'base.html' %}

{% block content %}
<h1>Welcome {{ current_user.username }}</h1>

<h2 align="center">Edit Note</h2>



<form method='post'>
     {{ form.hidden_tag() }}
     <p >
        {{ form.note(class='form-control' ) }}
    </p>
    <p align="center">{{ form.submit(class='btn btn-primary') }}</p>
</form>

{% endblock %}
